name: CI

on:
  push:
    branches: [master]
    paths: ['python/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['python/**', '.github/workflows/ci.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,litellm]"

      - name: Ruff
        run: ruff check rainforest_lab tests

      - name: Mypy
        run: mypy rainforest_lab

      - name: Pytest
        run: pytest tests/ -v --cov=rainforest_lab --cov-report=term-missing
